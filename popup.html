<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 320px;
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
        color: #1a1a1a;
        background: #fff;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .toggle-row .tlabel {
        font-size: 13px;
        font-weight: 600;
        color: #1a1a1a;
      }
      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex: none;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.15s;
      }
      .switch input:checked + .slider {
        background: #2a8a2a;
      }
      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }
      #form {
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: opacity 0.15s;
      }
      body.paused #form {
        opacity: 0.45;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      label {
        font-size: 12px;
        color: #666;
      }
      #url {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.15s;
      }
      #url:focus {
        border-color: #c00;
      }
      #save {
        width: 100%;
        padding: 9px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: #c00;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }
      #save:hover {
        background: #a00;
      }
      #save:disabled {
        background: #d99;
        cursor: not-allowed;
      }
      #save.saved {
        background: #2a8a2a;
      }
      .hint {
        font-size: 12px;
        color: #c00;
      }
      .stat {
        font-size: 12px;
        color: #666;
        text-align: center;
      }
      .stat b {
        color: #2a8a2a;
        font-weight: 700;
      }
      footer {
        font-size: 12px;
        text-align: center;
      }
      footer a {
        color: #c00;
        text-decoration: underline;
      }
      footer a:hover {
        color: #a00;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Home Blocker</h1>
    <div class="toggle-row">
      <span class="tlabel" id="toggleLabel">Redirecting the home feed</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>
    <form id="form">
      <div class="field">
        <label for="url" data-i18n="labelRedirectTo">Redirect YouTube home to</label>
        <input id="url" type="url" placeholder="https://example.com" />
        <span id="hint" class="hint" hidden data-i18n="hintInvalidUrl"
          >Enter a valid http(s) URL.</span
        >
      </div>
      <button id="save" type="submit" data-i18n="btnSave">Save</button>
    </form>
    <div class="stat" id="stat"></div>
    <footer>
      <span data-i18n="footerDeveloper">Developer:</span>
      <a
        href="https://iurii.rogulia.fi/projects/block-youtube-home"
        target="_blank"
        rel="noopener"
        >Iurii Rogulia</a
      >
    </footer>
    <script src="constants.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
